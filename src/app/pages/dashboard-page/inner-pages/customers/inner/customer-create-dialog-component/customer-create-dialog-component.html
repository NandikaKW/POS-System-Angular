<div class="dialog-container">
  <!-- Header -->
  <div class="dialog-header">
    <div class="dialog-header-left">
      <mat-icon class="header-icon">person_add</mat-icon>
      <h2 class="dialog-title">Add New Customer</h2>
    </div>
    <button class="close-btn" (click)="onCancel()" matTooltip="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Body -->
  <div class="dialog-body">
    <div class="form-group">
      <label class="form-label">
        <mat-icon class="label-icon">person</mat-icon>
        Full Name
        <span class="required">*</span>
      </label>
      <input
        type="text"
        [(ngModel)]="customer.name"
        placeholder="Enter customer full name"
        class="form-control"
        [class.error]="!customer.name?.trim() && customer.name !== undefined"
        required
      />
      <small class="form-error" *ngIf="!customer.name?.trim() && customer.name !== undefined">
        Name is required
      </small>
    </div>

    <div class="form-group">
      <label class="form-label">
        <mat-icon class="label-icon">location_on</mat-icon>
        Address
        <span class="required">*</span>
      </label>
      <input
        type="text"
        [(ngModel)]="customer.address"
        placeholder="Enter customer address"
        class="form-control"
        [class.error]="!customer.address?.trim() && customer.address !== undefined"
        required
      />
      <small class="form-error" *ngIf="!customer.address?.trim() && customer.address !== undefined">
        Address is required
      </small>
    </div>

    <div class="form-group">
      <label class="form-label">
        <mat-icon class="label-icon">attach_money</mat-icon>
        Salary
        <span class="required">*</span>
      </label>
      <div class="input-prefix">
        <span class="prefix">$</span>
        <input
          type="number"
          [(ngModel)]="customer.salary"
          placeholder="Enter salary amount"
          class="form-control form-control-prefix"
          [class.error]="(!customer.salary || customer.salary <= 0) && customer.salary !== undefined"
          required
          min="0"
          step="1000"
        />
      </div>
      <small class="form-error" *ngIf="(!customer.salary || customer.salary <= 0) && customer.salary !== undefined">
        Salary must be greater than 0
      </small>
    </div>

    <!-- Preview Card -->
    <div class="preview-card" *ngIf="customer.name || customer.address || customer.salary">
      <div class="preview-header">
        <mat-icon>preview</mat-icon>
        <span>Preview</span>
      </div>
      <div class="preview-content">
        <div class="preview-item">
          <span class="preview-label">Name:</span>
          <span class="preview-value">{{ customer.name || '—' }}</span>
        </div>
        <div class="preview-item">
          <span class="preview-label">Address:</span>
          <span class="preview-value">{{ customer.address || '—' }}</span>
        </div>
        <div class="preview-item">
          <span class="preview-label">Salary:</span>
          <span class="preview-value">{{ customer.salary | currency:'USD':'symbol':'1.0-0' || '—' }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="dialog-footer">
    <button class="btn-secondary" (click)="onCancel()">
      <mat-icon>cancel</mat-icon>
      Cancel
    </button>
    <button
      class="btn-primary"
      (click)="onSave()"
      [disabled]="!isValid()"
    >
      <mat-icon>save</mat-icon>
      Save Customer
    </button>
  </div>
</div>
