<header class="header">
  <div class="header__container">
    <!-- Logo -->
    <a class="header__brand" href="#" aria-label="Home">
      <div class="header__logo-wrapper">
        <img
          src="assets/logo.jpg"
          alt="POS System Logo"
          class="header__logo"
          height="40"
          width="40"
          loading="lazy"
        />
      </div>
      <span class="header__brand-text">POS SYSTEM</span>
    </a>

    <!-- Navigation -->
    <nav class="header__nav" aria-label="Main Navigation">
      <ul class="header__nav-list">
        <li class="header__nav-item">
          <a class="header__nav-link header__nav-link--active" href="#">
            <svg class="header__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
            </svg>
            Dashboard
          </a>
        </li>
        <li class="header__nav-item">
          <a class="header__nav-link" href="#">
            <svg class="header__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
            </svg>
            Sales
          </a>
        </li>
        <li class="header__nav-item">
          <a class="header__nav-link" href="#">
            <svg class="header__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="1" y="3" width="15" height="13" rx="2"/>
              <polyline points="16 8 20 8 23 11 23 16 16 16 16 8"/>
              <circle cx="5.5" cy="18" r="2.5"/>
              <circle cx="18.5" cy="18" r="2.5"/>
            </svg>
            Inventory
          </a>
        </li>
        <li class="header__nav-item">
          <a class="header__nav-link" href="#">
            <svg class="header__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87"/>
              <path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
            Customers
          </a>
        </li>
        <li class="header__nav-item">
          <a class="header__nav-link" href="#">
            <svg class="header__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            Reports
          </a>
        </li>
      </ul>
    </nav>

    <!-- Right Section -->
    <div class="header__right">
      <button class="header__notification" aria-label="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span class="header__notification-badge">3</span>
      </button>


    </div>
  </div>
</header>
